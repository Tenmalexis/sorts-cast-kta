<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encyclopédie Sorts — KTA Commentateur</title>
<link href="https://fonts.bunny.net/css?family=rajdhani:400,500,600,700|exo-2:400,500,600,700,800,900|dm-sans:400,500,600" rel="stylesheet">
<style>
:root {
  --bg:       #07090d;
  --bg2:      #0d1017;
  --bg3:      #121620;
  --bg4:      #181d2a;
  --bg5:      #1e2436;
  --border:   #1f2840;
  --border2:  #2a3550;
  --gold:     #f4b400;
  --gold2:    #ffd54f;
  --gold-dim: #7a5a00;
  --text:     #dde3f5;
  --muted:    #5a6a8a;
  --muted2:   #8a9ab8;
  --green:    #39d98a;
  --red:      #ff5c5c;
  --blue:     #4fa8ff;
  --purple:   #b06aff;
  --orange:   #ff8c42;
  --cyan:     #3ee8d0;

  /* Couleurs par élément */
  --col-terre:   #c8a060;
  --col-feu:     #ff6b35;
  --col-eau:     #4aa8d8;
  --col-air:     #a8d8a8;
  --col-neutre:  #b0b0c8;
  --col-invoc:   #b06aff;
  --col-util:    #f4b400;
  --col-passif:  #5a6a8a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grain overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: .4;
}

/* ─── LAYOUT ─────────────────────────────────────── */
.app { display: flex; height: 100vh; overflow: hidden; position: relative; z-index: 1; }

/* ─── SIDEBAR CLASSES ────────────────────────────── */
.sidebar {
  width: 160px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: stretch;
  padding: 0;
  gap: 0;
  overflow: hidden;
  flex-shrink: 0;
  justify-content: stretch;
}

.sidebar-logo {
  font-family: 'Exo 2', sans-serif;
  font-size: 10px;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity: .5;
}

.class-btn {
  width: 100%;
  border-radius: 0;
  border: none;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  cursor: pointer;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 8px;
  padding: 0 10px;
  transition: all .15s;
  flex: 1;
}
.class-btn:hover {
  background: var(--bg4);
}
.class-btn.active {
  background: rgba(244,180,0,.08);
  border-left: 3px solid var(--gold);
}
.class-btn img {
  width: 30px; height: 30px;
  object-fit: contain;
  image-rendering: auto;
  border-radius: 5px;
  flex-shrink: 0;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,.5));
}
.class-btn .class-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .3px;
  text-transform: uppercase;
  color: var(--muted);
  line-height: 1;
  white-space: nowrap;
}
.class-btn.active .class-label { color: var(--gold); }
.class-btn.active img { filter: drop-shadow(0 0 4px rgba(244,180,0,.5)); }

/* ─── MAIN PANEL ─────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ─── TOPBAR ─────────────────────────────────────── */
.topbar {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.topbar-title {
  font-family: 'Exo 2', sans-serif;
  font-size: 15px;
  font-weight: 800;
  color: var(--gold);
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
}
.topbar-sub {
  font-size: 12px;
  color: var(--muted);
}

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.yt-link {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: rgba(255,0,0,.1);
  border: 1px solid rgba(255,0,0,.3);
  border-radius: 6px;
  color: #ff4444;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .5px;
  text-decoration: none;
  transition: all .2s;
  flex-shrink: 0;
}
.yt-link:hover {
  background: rgba(255,0,0,.2);
  border-color: rgba(255,0,0,.6);
  color: #ff6666;
}

/* Filtre élément */
.el-filters {
  display: flex;
  gap: 4px;
}
.el-btn {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: all .15s;
  opacity: .5;
}
.el-btn:hover { opacity: .8; border-color: var(--border2); }
.el-btn.active { opacity: 1; border-color: currentColor; }
.el-btn[data-el="terre"] { color: var(--col-terre); }
.el-btn[data-el="feu"]   { color: var(--col-feu); }
.el-btn[data-el="eau"]   { color: var(--col-eau); }
.el-btn[data-el="air"]   { color: var(--col-air); }
.el-btn[data-el="invoc"] { color: var(--col-invoc); }
.el-btn[data-el="util"]  { color: var(--col-util); }
.el-btn.active[data-el="terre"] { background: rgba(200,160,96,.1); }
.el-btn.active[data-el="feu"]   { background: rgba(255,107,53,.1); }
.el-btn.active[data-el="eau"]   { background: rgba(74,168,216,.1); }
.el-btn.active[data-el="air"]   { background: rgba(168,216,168,.1); }
.el-btn.active[data-el="invoc"] { background: rgba(176,106,255,.1); }
.el-btn.active[data-el="util"]  { background: rgba(244,180,0,.1); }

.search-bar {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 7px 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  outline: none;
  width: 180px;
  transition: border-color .2s;
}
.search-bar:focus { border-color: var(--gold); }
.search-bar::placeholder { color: var(--muted); }

/* ─── CONTENT ────────────────────────────────────── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── EMPTY STATE ────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 16px;
  color: var(--muted);
}
.empty-state .big-icon { font-size: 64px; opacity: .3; }
.empty-state h2 {
  font-family: 'Exo 2', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--muted2);
}
.empty-state p { font-size: 13px; }

/* ─── LOADING ────────────────────────────────────── */
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 16px;
}
.loading-ring {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ─── SPELL GRID ─────────────────────────────────── */
.spells-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 8px;
}

/* ─── SPELL CARD ─────────────────────────────────── */
.spell-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: all .2s;
  position: relative;
}
.spell-card:hover {
  border-color: var(--border2);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.spell-card.expanded {
  border-color: var(--gold-dim);
  box-shadow: 0 0 0 1px rgba(244,180,0,.2);
}

.spell-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
}

.spell-icon-wrap {
  position: relative; flex-shrink: 0;
}
.spell-icon {
  width: 44px; height: 44px;
  border-radius: 8px;
  object-fit: contain;
  image-rendering: pixelated;
  background: var(--bg3);
  border: 1px solid var(--border);
}
.spell-icon-placeholder {
  width: 44px; height: 44px;
  border-radius: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; opacity: .4;
}

.spell-meta { flex: 1; min-width: 0; }
.spell-name {
  font-family: 'Exo 2', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}
.spell-tags { display: flex; gap: 4px; flex-wrap: wrap; }

.tag {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 4px;
}
.tag-terre  { background: rgba(200,160,96,.15); color: var(--col-terre); }
.tag-feu    { background: rgba(255,107,53,.15); color: var(--col-feu); }
.tag-eau    { background: rgba(74,168,216,.15); color: var(--col-eau); }
.tag-air    { background: rgba(168,216,168,.15); color: var(--col-air); }
.tag-neutre { background: rgba(176,176,200,.15); color: var(--col-neutre); }
.tag-invoc  { background: rgba(176,106,255,.15); color: var(--col-invoc); }
.tag-util   { background: rgba(244,180,0,.15); color: var(--col-util); }
.tag-passif { background: rgba(90,106,138,.15); color: var(--col-passif); }
.tag-pa     { background: rgba(79,168,255,.12); color: var(--blue); }
.tag-pm     { background: rgba(57,217,138,.12); color: var(--green); }

.spell-quick-stats {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-shrink: 0;
}
.qs-item {
  display: flex; flex-direction: column;
  align-items: center;
  gap: 1px;
}
.qs-val {
  font-family: 'Exo 2', sans-serif;
  font-size: 14px;
  font-weight: 800;
  line-height: 1;
}
.qs-val.pa { color: var(--blue); }
.qs-val.po { color: var(--cyan); }
.qs-val.cc { color: var(--gold); }
.qs-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
}

.expand-arrow {
  color: var(--muted);
  font-size: 12px;
  transition: transform .2s;
  flex-shrink: 0;
}
.spell-card.expanded .expand-arrow { transform: rotate(180deg); }

/* ─── SPELL DETAILS ──────────────────────────────── */
.spell-details {
  border-top: 1px solid var(--border);
  padding: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease, padding .3s;
}
.spell-card.expanded .spell-details {
  max-height: 1000px;
  padding: 14px;
}

.detail-section { margin-bottom: 12px; }
.detail-section:last-child { margin-bottom: 0; }

.detail-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.detail-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.stat-box {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  display: flex; flex-direction: column; gap: 2px;
}
.stat-box-val {
  font-family: 'Exo 2', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.stat-box-val.highlight { color: var(--gold); }
.stat-box-label {
  font-size: 10px;
  color: var(--muted);
  line-height: 1;
}

/* Effets */
.effects-list { display: flex; flex-direction: column; gap: 4px; }
.effect-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 5px 8px;
  background: var(--bg3);
  border-radius: 5px;
  border-left: 2px solid transparent;
  font-size: 12px;
}
.effect-row.dmg-terre  { border-color: var(--col-terre); }
.effect-row.dmg-feu    { border-color: var(--col-feu); }
.effect-row.dmg-eau    { border-color: var(--col-eau); }
.effect-row.dmg-air    { border-color: var(--col-air); }
.effect-row.dmg-neutre { border-color: var(--col-neutre); }
.effect-row.dmg-soin   { border-color: var(--green); }
.effect-row.effect-special { border-color: var(--purple); }

.effect-dmg {
  font-family: 'Exo 2', sans-serif;
  font-weight: 700;
  font-size: 13px;
  white-space: nowrap;
  min-width: 60px;
}
.effect-dmg.terre  { color: var(--col-terre); }
.effect-dmg.feu    { color: var(--col-feu); }
.effect-dmg.eau    { color: var(--col-eau); }
.effect-dmg.air    { color: var(--col-air); }
.effect-dmg.neutre { color: var(--col-neutre); }
.effect-dmg.soin   { color: var(--green); }

.effect-desc { color: var(--muted2); flex: 1; line-height: 1.3; }

/* Variantes */
.variants-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.variant-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  color: var(--muted2);
}
.variant-chip:hover {
  border-color: var(--gold-dim);
  color: var(--gold);
  background: rgba(244,180,0,.05);
}
.variant-chip img {
  width: 20px; height: 20px;
  image-rendering: pixelated;
  border-radius: 3px;
}
.variant-chip .v-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
}

/* ─── MULTI-CLASS PANEL ─────────────────────────── */
.multiclass-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.multiclass-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
}
.multiclass-badge img {
  width: 24px; height: 24px;
  image-rendering: pixelated;
  border-radius: 4px;
}
.multiclass-badge .mc-name {
  font-family: 'Exo 2', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.mc-remove {
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  font-size: 12px; padding: 0 0 0 4px;
  transition: color .15s;
}
.mc-remove:hover { color: var(--red); }

.class-section { margin-bottom: 32px; }
.class-section-title {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--bg3);
  border-radius: 8px;
  border-left: 3px solid var(--gold);
}
.class-section-title img {
  width: 32px; height: 32px;
  image-rendering: pixelated;
  border-radius: 6px;
}
.class-section-title h2 {
  font-family: 'Exo 2', sans-serif;
  font-size: 16px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gold);
}
.class-section-title .spell-count {
  font-size: 12px;
  color: var(--muted);
  margin-left: auto;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
}

/* ─── MODE TABS ──────────────────────────────────── */
.mode-tabs {
  display: flex;
  gap: 2px;
  background: var(--bg3);
  padding: 3px;
  border-radius: 8px;
  border: 1px solid var(--border);
}
.mode-tab {
  padding: 5px 12px;
  border-radius: 5px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .15s;
}
.mode-tab.active {
  background: var(--bg5);
  color: var(--gold);
  border: 1px solid var(--border2);
}

/* ─── TOOLTIP ────────────────────────────────────── */
.tooltip {
  position: fixed;
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text);
  pointer-events: none;
  z-index: 1000;
  max-width: 200px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  display: none;
}

/* ─── SCROLLBAR GLOBAL ───────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── RESPONSIVE ─────────────────────────────────── */
@media (max-width: 600px) {
  .spells-grid { grid-template-columns: 1fr; }
  .sidebar { width: 60px; }
  .class-btn { width: 44px; height: 44px; }
  .search-bar { width: 120px; }
}

/* ─── PAIR CARD ──────────────────────────────────── */
.spell-pair {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: all .2s;
}
.spell-pair:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
.spell-pair.expanded { border-color: var(--gold-dim); }

.pair-header {
  display: flex;
  align-items: stretch;
  cursor: pointer;
  position: relative;
  min-height: 0;
}

/* Les deux halves côte à côte, même largeur */
.spell-half {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 10px 8px 8px;
  text-align: center;
  min-width: 0;
  border-top: 3px solid transparent;
}
.spell-half.main    { border-right: 1px solid var(--border); }
.spell-half.variant { }

/* Bordure top par élément */
.spell-half[data-el="terre"]  { border-top-color: #c8a060; }
.spell-half[data-el="feu"]    { border-top-color: #ff6b35; }
.spell-half[data-el="eau"]    { border-top-color: #4aa8d8; }
.spell-half[data-el="air"]    { border-top-color: #a8d8a8; }
.spell-half[data-el="neutre"] { border-top-color: #b0b0c8; }
.spell-half[data-el="invoc"]  { border-top-color: #b06aff; }
.spell-half[data-el="soin"]   { border-top-color: #39d98a; }
.spell-half[data-el="util"]   { border-top-color: #3a4560; }

/* Icône centrée */
.spell-half .spell-icon {
  width: 52px; height: 52px;
  border-radius: 10px;
  object-fit: contain;
  image-rendering: auto;
  border: 1px solid var(--border);
  background: var(--bg3);
  flex-shrink: 0;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.5));
}

/* Nom sous l'icône */
.spell-half .spell-name {
  font-family: 'Exo 2', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  word-break: break-word;
  hyphens: auto;
}
.spell-half.variant .spell-name { color: var(--gold); }
.spell-lvl {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .5px;
}
.spell-lvl {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .5px;
}

/* Tags éléments */
.spell-half .spell-tags {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  justify-content: center;
}

/* Stats PA/PO/CC en bas */
.spell-half .spell-quick-stats {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}

/* Divider central — flèche entre les deux */
.pair-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  color: var(--muted);
  font-size: 12px;
  flex-shrink: 0;
  background: var(--bg3);
  border-right: 1px solid var(--border);
}

/* Flèche expand en bas à droite */
.expand-arrow {
  position: absolute;
  bottom: 6px; right: 8px;
  color: var(--muted);
  font-size: 10px;
  transition: transform .2s;
  pointer-events: none;
}
.spell-pair.expanded .expand-arrow { transform: rotate(180deg); }

/* ─── DETAILS DOUBLE ─────────────────────────────── */
.spell-details {
  border-top: 1px solid var(--border);
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease;
}
.spell-pair.expanded .spell-details { max-height: 1200px; }

.details-double {
  display: grid;
  grid-template-columns: 1fr 1px 1fr;
  gap: 0;
}
.details-col { padding: 14px 16px; }
.details-col-title {
  font-family: 'Exo 2', sans-serif;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.details-sep { background: var(--border); }
.main-col    { }
.variant-col { }

/* Stats mini grid */
.detail-stats-mini {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
}
.stat-mini {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 5px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  min-width: 38px;
}
.stat-mini span { font-family: 'Exo 2', sans-serif; font-size: 13px; font-weight: 700; line-height: 1; }
.stat-mini small { font-size: 9px; color: var(--muted); line-height: 1; }
.stat-mini.hi span { color: var(--blue); }

.detail-fx-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
  margin: 8px 0 4px;
}
.effects-list { display: flex; flex-direction: column; gap: 3px; }
.effect-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 4px 7px;
  background: var(--bg3);
  border-radius: 4px;
  font-size: 12px;
}
.effect-dmg {
  font-family: 'Exo 2', sans-serif;
  font-weight: 700;
  font-size: 12px;
  min-width: 50px;
  white-space: nowrap;
}
.effect-desc { color: var(--muted2); flex: 1; line-height: 1.3; }

.spell-desc {
  margin-top: 8px;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.5;
  padding: 6px 8px;
  background: var(--bg3);
  border-radius: 4px;
  font-style: italic;
}
.no-data { padding: 12px; color: var(--muted); font-size: 12px; text-align: center; }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR CLASSES -->
  <div class="sidebar" id="sidebar">
    
    <!-- Généré par JS -->
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbarTitle">Encyclopédie Sorts</div>
        <div class="topbar-sub" id="topbarSub">Clique sur une classe pour afficher ses sorts</div>
      </div>
      <a href="https://www.youtube.com/@Tenmalexis" target="_blank" class="yt-link">▶ @Tenmalexis</a>
      <div class="topbar-right">
        <div class="mode-tabs" id="modeTabs" style="display:none">
          <button class="mode-tab active" data-mode="single" onclick="setMode('single')">Classe</button>
          <button class="mode-tab" data-mode="multi" onclick="setMode('multi')">Multi</button>
        </div>

        <input class="search-bar" id="searchBar" placeholder="🔍 Chercher un sort…" oninput="filterSpells()" style="display:none">
      </div>
    </div>
    <div class="content" id="content">
      <div class="empty-state">
        <div class="big-icon">⚔️</div>
        <h2>Sélectionne une classe</h2>
        <p>Clique sur une icône à gauche pour explorer ses sorts</p>
        <p style="margin-top:8px;font-size:11px;color:var(--muted)">Mode Multi : sélectionne plusieurs classes (KTA 3v3)</p>
      </div>
    </div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const BREEDS = [
  { id:9,  name:'Crâ',        short:'Crâ'    },
  { id:6,  name:'Ecaflip',    short:'Eca'    },
  { id:16, name:'Éliotrope',  short:'Élio'   },
  { id:7,  name:'Eniripsa',   short:'Eni'    },
  { id:3,  name:'Enutrof',    short:'Enu'    },
  { id:1,  name:'Féca',       short:'Féca'   },
  { id:20, name:'Forgelance', short:'Forge'  },
  { id:17, name:'Huppermage', short:'Hupp'   },
  { id:8,  name:'Iop',        short:'Iop'    },
  { id:18, name:'Ouginak',    short:'Ougi'   },
  { id:2,  name:'Osamodas',   short:'Osa'    },
  { id:12, name:'Pandawa',    short:'Panda'  },
  { id:13, name:'Roublard',   short:'Roub'   },
  { id:11, name:'Sacrieur',   short:'Sacri'  },
  { id:10, name:'Sadida',     short:'Sadi'   },
  { id:4,  name:'Sram',       short:'Sram'   },
  { id:15, name:'Steamer',    short:'Steam'  },
  { id:5,  name:'Xélor',      short:'Xél'    },
  { id:14, name:'Zobal',      short:'Zobal'  },
];

const EL_MAP   = { 0:'neutre', 1:'feu', 2:'eau', 3:'air', 4:'terre', 5:'neutre' };
const EL_COLOR = { terre:'#c8a060', feu:'#ff6b35', eau:'#4aa8d8', air:'#a8d8a8', neutre:'#b0b0c8', invoc:'#b06aff', util:'#f4b400', soin:'#39d98a' };
const EL_LABEL = { terre:'Terre', feu:'Feu', eau:'Eau', air:'Air', neutre:'Neutre', invoc:'Invoc', util:'Util', soin:'Soin' };
const EFFECT_NAMES = {
  100:'Dommages', 97:'Dommages (zone)', 101:'Dommages indirects', 91:'Renvoi dommages',
  81:'Soins', 105:'Vol de vie', 96:'Renvoi soins',
  108:'Perd PA', 109:'Vol PA', 110:'Perd PM', 111:'Vol PM',
  126:'Attire', 127:'Repousse', 128:'Téléporte',
  132:'Invoque', 140:'Applique état', 950:'Retire état',
  6:'Déplace', 202:'Modifie portée',
};

const API = 'https://api.dofusdb.fr';

// Cache: breedId -> { pairs: [{main, variant}], levels: {spellId: levelObj} }
const cache = {};

let activeBreeds = [];
let activeBreed  = null;
let mode         = 'single';
let activeFilters = new Set(['terre','feu','eau','air','invoc','util','neutre','soin']);
let searchQuery  = '';

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  renderSidebar();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  BREEDS.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'class-btn';
    btn.dataset.id = b.id;
    btn.title = b.name;
    btn.innerHTML = `<span class="class-label">${b.short}</span>`;
    btn.addEventListener('click', () => onClassClick(b));
    sb.appendChild(btn);
  });
  loadBreedIcons();
}

async function loadBreedIcons() {
  try {
    const r = await fetch(`${API}/breeds?lang=fr&$limit=25`);
    const d = await r.json();
    (d.data||[]).forEach(b => {
      const btn = document.querySelector(`.class-btn[data-id="${b.id}"]`);
      if (!btn) return;
      const url = b.img || (b.iconId ? `${API}/img/${b.iconId}.png` : null);
      const breed = BREEDS.find(br => br.id === b.id);
      const label = b.name?.fr || (breed ? breed.name : '');
      if (url) btn.innerHTML = `<img src="${url}" alt="${label}" onerror="this.style.display='none'"><span class="class-label">${label}</span>`;
    });
  } catch(e) {}
}

// ─── FETCH ────────────────────────────────────────────────────────────────────
async function fetchBreed(breedId) {
  if (cache[breedId]) return cache[breedId];

  // 1. Fetch spell-variants (contient sort principal + variante + spells embedded)
  const rv = await fetch(`${API}/spell-variants?breedId=${breedId}&lang=fr&$limit=100`);
  const dv = await rv.json();
  const variants = dv.data || [];

  // 2. Construire les paires {main, variant}
  // Chaque variant a spells[] avec 2 sorts (ou 1 si pas de variante)
  // Le "principal" = typeId == breedId, la "variante" = typeId != breedId
  const pairs = variants.map(v => {
    const spells = v.spells || [];
    const main    = spells.find(s => s.typeId === breedId) || spells[0];
    const variant = spells.find(s => s !== main) || null;
    return { main, variant };
  }).filter(p => p.main);

  // Trier par order du sort principal
  pairs.sort((a, b) => (a.main.order||0) - (b.main.order||0));

  // 3. Collecter dernier grade (stats) + premier grade (niveau acquisition)
  const allSpells = pairs.flatMap(p => [p.main, p.variant].filter(Boolean));
  const lastIds  = allSpells.flatMap(s => { const ls = s.spellLevels||[]; return ls.length ? [ls[ls.length-1]] : []; });
  const firstIds = allSpells.flatMap(s => { const ls = s.spellLevels||[]; return ls.length ? [ls[0]] : []; });
  const uniqueLevelIds = [...new Set([...lastIds, ...firstIds])];

  // 4. Batch fetch spell-levels
  const levels = {};       // spellId -> grade max (stats finales)
  const firstLevels = {};  // spellId -> grade 1 (minPlayerLevel)
  for (let i = 0; i < uniqueLevelIds.length; i += 40) {
    const chunk = uniqueLevelIds.slice(i, i+40);
    const param = chunk.map(id => `id[$in][]=${id}`).join('&');
    const rl = await fetch(`${API}/spell-levels?${param}&lang=fr&$limit=80`);
    const dl = await rl.json();
    (dl.data||[]).forEach(lv => {
      // Premier grade du spell ?
      const isFirst = allSpells.some(s => (s.spellLevels||[])[0] === lv.id);
      if (isFirst) firstLevels[lv.spellId] = lv;
      // Dernier grade du spell ?
      const isLast = allSpells.some(s => { const ls = s.spellLevels||[]; return ls[ls.length-1] === lv.id; });
      if (isLast) levels[lv.spellId] = lv;
    });
  }

  cache[breedId] = { pairs, levels, firstLevels };
  return cache[breedId];
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function onClassClick(breed) {
  if (mode === 'single') {
    activeBreed = breed;
    document.querySelectorAll('.class-btn').forEach(b =>
      b.classList.toggle('active', Number(b.dataset.id) === breed.id));
    loadAndRenderSingle(breed);
  } else {
    const idx = activeBreeds.findIndex(b => b.id === breed.id);
    if (idx >= 0) activeBreeds.splice(idx, 1);
    else { if (activeBreeds.length >= 6) activeBreeds.shift(); activeBreeds.push(breed); }
    document.querySelectorAll('.class-btn').forEach(b =>
      b.classList.toggle('active', activeBreeds.some(ab => ab.id === Number(b.dataset.id))));
    activeBreeds.length ? loadAndRenderMulti() : showEmpty();
  }
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  if (m === 'single') {
    document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
    activeBreeds = [];
    if (activeBreed) {
      document.querySelector(`.class-btn[data-id="${activeBreed.id}"]`)?.classList.add('active');
      loadAndRenderSingle(activeBreed);
    } else showEmpty();
  } else {
    document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
    activeBreed = null;
    showEmpty('Mode Multi — sélectionne jusqu\'à 6 classes');
  }
}

function toggleEl(btn) {
  const el = btn.dataset.el;
  activeFilters.has(el) ? activeFilters.delete(el) : activeFilters.add(el);
  btn.classList.toggle('active', activeFilters.has(el));
  applyFilters();
}

function filterSpells() {
  searchQuery = document.getElementById('searchBar').value.toLowerCase();
  applyFilters();
}

function applyFilters() {
  document.querySelectorAll('.spell-pair').forEach(card => {
    const name = card.dataset.name || '';
    const srchOk = !searchQuery || name.includes(searchQuery);
    card.style.display = srchOk ? '' : 'none';
  });
  document.querySelectorAll('.class-section').forEach(sec => {
    const vis = [...sec.querySelectorAll('.spell-pair')].some(c => c.style.display !== 'none');
    sec.style.display = vis ? '' : 'none';
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
async function loadAndRenderSingle(breed) {
  showUI(true);
  document.getElementById('topbarTitle').textContent = breed.name.toUpperCase();
  document.getElementById('topbarSub').textContent = 'Chargement…';
  showLoading();
  const data = await fetchBreed(breed.id);
  document.getElementById('topbarSub').textContent = `${data.pairs.length} sorts — cliquer pour détails`;
  const content = document.getElementById('content');
  content.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'spells-grid';
  data.pairs.forEach(p => grid.appendChild(buildPairCard(p, data.levels, data.firstLevels)));
  content.appendChild(grid);
  applyFilters();
}

async function loadAndRenderMulti() {
  showUI(true);
  document.getElementById('topbarTitle').textContent = 'MULTI — KTA';
  document.getElementById('topbarSub').textContent = activeBreeds.map(b => b.name).join(' · ');
  showLoading();
  await Promise.all(activeBreeds.map(b => fetchBreed(b.id)));
  const content = document.getElementById('content');
  content.innerHTML = '';

  const hdr = document.createElement('div');
  hdr.className = 'multiclass-header';
  activeBreeds.forEach(b => {
    hdr.innerHTML += `<div class="multiclass-badge">
      <span class="mc-name">${b.name}</span>
      <button class="mc-remove" onclick="removeFromMulti(${b.id})">✕</button>
    </div>`;
  });
  content.appendChild(hdr);

  activeBreeds.forEach(breed => {
    const data = cache[breed.id] || { pairs:[], levels:{} };
    const sec = document.createElement('div');
    sec.className = 'class-section';
    sec.dataset.breedId = breed.id;
    sec.innerHTML = `<div class="class-section-title">
      <h2>${breed.name}</h2>
      <span class="spell-count">${data.pairs.length} sorts</span>
    </div>`;
    const grid = document.createElement('div');
    grid.className = 'spells-grid';
    data.pairs.forEach(p => grid.appendChild(buildPairCard(p, data.levels, data.firstLevels)));
    sec.appendChild(grid);
    content.appendChild(sec);
  });
  applyFilters();
}

function removeFromMulti(breedId) {
  activeBreeds = activeBreeds.filter(b => b.id !== breedId);
  document.querySelector(`.class-btn[data-id="${breedId}"]`)?.classList.remove('active');
  activeBreeds.length ? loadAndRenderMulti() : showEmpty('Mode Multi — sélectionne des classes');
}

// ─── PAIR CARD (sort + variante côte à côte) ──────────────────────────────────
function buildPairCard(pair, levels, firstLevels) {
  firstLevels = firstLevels || {};
  const { main, variant } = pair;
  const mainLvl  = levels[main.id] || null;
  const varLvl   = variant ? (levels[variant.id] || null) : null;
  const mainFirst = firstLevels[main.id] || mainLvl;
  const varFirst  = variant ? (firstLevels[variant.id] || varLvl) : null;

  const elements = [...new Set([...detectElements(mainLvl), ...detectElements(varLvl)])];
  const allNames = [main.name?.fr, variant?.name?.fr].filter(Boolean).join(' / ').toLowerCase();

  const card = document.createElement('div');
  card.className = 'spell-pair';
  card.dataset.name     = allNames;
  card.dataset.elements = elements.join(',');

  const mainHtml    = buildSpellHalf(main, mainLvl, 'main', mainFirst);
  const variantHtml = variant ? buildSpellHalf(variant, varLvl, 'variant', varFirst) : '';

  const divider = variant ? `<div class="pair-divider">⟷</div>` : '';
  card.innerHTML = `
    <div class="pair-header" onclick="togglePair(this.parentElement)">
      ${mainHtml}
      ${divider}
      ${variantHtml}
      <span class="expand-arrow">▼</span>
    </div>
    <div class="spell-details">
      ${buildDetailsDouble(main, mainLvl, variant, varLvl)}
    </div>
  `;
  return card;
}

function buildSpellHalf(spell, lvl, role, firstLvl) {
  firstLvl = firstLvl || lvl;
  const name  = spell.name?.fr || '?';
  const icon  = spell.img || `${API}/img/spells/sort_0.png`;
  const pa    = lvl?.apCost ?? '?';
  const poMin = lvl?.minRange ?? 1;
  const poMax = lvl?.range ?? '?';
  const cc    = lvl?.criticalHitProbability || null;
  const poStr = (poMin <= 1 && poMax === 1) ? `${poMax}` : `${poMin}-${poMax}`;
  const elements = detectElements(lvl);

  const mainEl = elements[0] || 'util';
  const minLvl = firstLvl?.minPlayerLevel || null;
  return `<div class="spell-half ${role}" data-el="${mainEl}">
    <img class="spell-icon" src="${icon}" alt="${name}" onerror="this.src='${API}/img/spells/sort_0.png'">
    <div class="spell-name" title="${name}">${name}</div>
    ${minLvl ? `<div class="spell-lvl">Niv. ${minLvl}</div>` : ''}
    <div class="spell-quick-stats">
      <div class="qs-item"><span class="qs-val pa">${pa}</span><span class="qs-label">PA</span></div>
      <div class="qs-item"><span class="qs-val po">${poStr}</span><span class="qs-label">PO</span></div>
      ${cc ? `<div class="qs-item"><span class="qs-val cc">${cc}%</span><span class="qs-label">CC</span></div>` : ''}
    </div>
  </div>`;
}

function togglePair(card) { card.classList.toggle('expanded'); }

// ─── DETAILS DOUBLE (sort principal + variante en colonnes) ───────────────────
function buildDetailsDouble(main, mainLvl, variant, varLvl) {
  const mainDetail    = buildSpellDetail(main, mainLvl);
  const variantDetail = variant ? buildSpellDetail(variant, varLvl) : '';

  if (!variant) return mainDetail;

  return `<div class="details-double">
    <div class="details-col main-col">
      <div class="details-col-title" style="color:var(--blue)">${main.name?.fr}</div>
      ${mainDetail}
    </div>
    <div class="details-sep"></div>
    <div class="details-col variant-col">
      <div class="details-col-title" style="color:var(--gold)">${variant.name?.fr}</div>
      ${variantDetail}
    </div>
  </div>`;
}

function buildSpellDetail(spell, lvl) {
  if (!lvl) return `<div class="no-data">Données indisponibles</div>`;

  const pa      = lvl.apCost ?? '?';
  const poMin   = lvl.minRange ?? 1;
  const poMax   = lvl.range ?? '?';
  const cc      = lvl.criticalHitProbability;
  const los     = lvl.castTestLos;
  const linear  = lvl.castInLine;
  const modPO   = lvl.rangeCanBeBoosted;
  const perTurn = lvl.maxCastPerTurn;
  const cd      = lvl.minCastInterval;

  const stats = [
    { val: pa,                   label: 'PA',      hi: true },
    { val: `${poMin}→${poMax}`,  label: 'PO' },
    cc      ? { val: cc+'%',   label: 'CC' }    : null,
    los     ? { val: '✓',      label: 'LdV' }   : { val: '✗', label: 'LdV' },
    linear  ? { val: '✓',      label: 'Ligne' } : null,
    modPO   ? { val: '✓',      label: 'PO+' }   : null,
    perTurn > 0 ? { val: perTurn, label: '/tour' } : null,
    cd      > 0 ? { val: cd,     label: 'CD' }    : null,
  ].filter(Boolean);

  const effects   = lvl.effects || [];
  const ccEffects = lvl.criticalEffect || [];
  const visibleFx   = effects.filter(e => e.visibleInTooltip === true && e.diceNum > 0 && EFFECT_NAMES[e.effectId]);
  const visibleCCFx = ccEffects.filter(e => e.visibleInTooltip === true && e.diceNum > 0 && EFFECT_NAMES[e.effectId]);

  const desc = spell.description?.fr || '';

  return `
    <div class="detail-stats-mini">
      ${stats.map(s => `<div class="stat-mini ${s.hi?'hi':''}"><span>${s.val}</span><small>${s.label}</small></div>`).join('')}
    </div>
    ${visibleFx.length ? `
      <div class="detail-fx-title">Effets</div>
      <div class="effects-list">${visibleFx.map(e => buildEffectRow(e)).join('')}</div>
    ` : ''}
    ${visibleCCFx.length ? `
      <div class="detail-fx-title">⚡ Critique</div>
      <div class="effects-list">${visibleCCFx.map(e => buildEffectRow(e, true)).join('')}</div>
    ` : ''}
    ${desc ? `<div class="spell-desc">${desc}</div>` : ''}
  `;
}

function buildEffectRow(fx) {
  const min  = fx.diceNum ?? 0;
  const max  = fx.diceSide ?? 0;
  const el   = EL_MAP[fx.effectElement] || 'neutre';
  const name = EFFECT_NAMES[fx.effectId] || `Effet ${fx.effectId}`;
  const isDmg = [100,97,101,91,96,81,105].includes(fx.effectId);
  const isSoin = fx.effectId === 81;
  const elKey = isSoin ? 'soin' : el;
  const color = EL_COLOR[isDmg ? elKey : 'util'] || 'var(--muted2)';
  const dmgStr = max > 0 ? (min === max ? `${min}` : `${min}→${max}`) : (min > 0 ? `${min}` : '');

  return `<div class="effect-row">
    <span class="effect-dmg" style="color:${color}">${dmgStr || '—'}</span>
    <span class="effect-desc">${name}${isDmg && el !== 'neutre' && !isSoin ? ` <em style="color:${color};font-size:10px">${EL_LABEL[el]}</em>` : ''}</span>
  </div>`;
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function detectElements(lvl) {
  if (!lvl) return ['util'];
  const els = new Set();
  const allFx = [...(lvl.effects||[]), ...(lvl.criticalEffect||[])];
  allFx.forEach(fx => {
    // Dommages directs (visibleInTooltip + diceNum > 0)
    const isDmg = [100,97,101,91,96,105].includes(fx.effectId);
    if (isDmg && fx.diceNum > 0 && fx.visibleInTooltip !== false) {
      // effectElement: 0=neutre,1=feu,2=eau,3=air,4=terre — -1 = pas de type visible
      if (fx.effectElement >= 0) {
        const el = EL_MAP[fx.effectElement];
        if (el) els.add(el);
      }
    }
    if (fx.effectId === 81 && fx.diceNum > 0) els.add('soin');
    if (fx.effectId === 132) els.add('invoc');
  });
  if (els.size === 0) els.add('util');
  return [...els];
}

function showEmpty(msg = 'Clique sur une classe pour afficher ses sorts') {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="big-icon">⚔️</div>
      <h2>Encyclopédie Sorts</h2>
      <p>${msg}</p>
      <p style="margin-top:8px;font-size:11px;color:var(--muted)">Mode Multi : sélectionne plusieurs classes (KTA 3v3)</p>
    </div>`;
}

function showLoading() {
  document.getElementById('content').innerHTML = `
    <div class="loading-state">
      <div class="loading-ring"></div>
      <div class="loading-text">Chargement…</div>
    </div>`;
}

function showUI(show) {
  document.getElementById('modeTabs').style.display = show ? '' : 'none';
  document.getElementById('searchBar').style.display = show ? '' : 'none';
}

init();
</script>
